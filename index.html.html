<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rimnote</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Roboto:wght@400;500;700&family=Playfair+Display:wght@400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        roboto: ['Roboto', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                        arial: ['Arial', 'Helvetica', 'sans-serif'],
                        times: ['"Times New Roman"', 'Times', 'serif']
                    },
                    colors: {
                        // Premium Dark Theme
                        obsidian: {
                            bg: '#0f111a',       
                            sidebar: '#161925',  
                            border: '#2a2f42',   
                            text: '#e2e8f0',     
                            muted: '#8f9bb3',    
                            active: '#242b3d',   
                            accent: '#6366f1'    
                        },
                        light: {
                            bg: '#ffffff',
                            sidebar: '#f8fafc',
                            border: '#e2e8f0',
                            text: '#0f172a',
                            muted: '#64748b',
                            active: '#e2e8f0',
                            accent: '#4f46e5'
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        body { font-family: 'Inter', sans-serif; overflow: hidden; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #334155; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Sidebar transition */
        #sidebar { transition: width 0.3s ease, opacity 0.3s ease, transform 0.3s ease; }
        #sidebar.collapsed { width: 0 !important; opacity: 0; border: none; overflow: hidden; padding: 0; }

        /* Content Editable Styles */
        [contenteditable]:empty::before {
            content: attr(placeholder);
            color: #9ca3af;
            pointer-events: none;
            display: block;
        }
        .dark [contenteditable]:empty::before { color: #475569; }
        .editor-content { outline: none; min-height: 50vh; }
        .editor-title { outline: none; }
        
        /* Rich Text Formatting */
        .editor-content b, .editor-content strong { font-weight: 700; }
        .editor-content i, .editor-content em { font-style: italic; }
        .editor-content u { text-decoration: underline; }
        .editor-content ul { list-style-type: disc; padding-left: 1.5rem; margin: 0.5rem 0; }
        .editor-content ol { list-style-type: decimal; padding-left: 1.5rem; margin: 0.5rem 0; }
        .editor-content h1 { font-size: 2.25rem; font-weight: 700; margin-top: 1.5rem; margin-bottom: 0.5rem; }
        .editor-content h2 { font-size: 1.875rem; font-weight: 600; margin-top: 1.25rem; margin-bottom: 0.5rem; }
        .editor-content h3 { font-size: 1.5rem; font-weight: 600; margin-top: 1rem; margin-bottom: 0.5rem; }
        .editor-content input[type="checkbox"] { margin-right: 8px; transform: scale(1.2); accent-color: #6366f1; cursor: pointer; }
        
        /* Line Spacing Classes */
        .spacing-normal { line-height: 1.5; }
        .spacing-relaxed { line-height: 1.75; }
        .spacing-loose { line-height: 2; }
        .spacing-very-loose { line-height: 2.5; }

        /* Tabs */
        .tab-item.active { border-bottom: 2px solid #6366f1; background-color: rgba(99, 102, 241, 0.05); }
        .dark .tab-item.active { border-bottom: 2px solid #818cf8; background-color: rgba(129, 140, 248, 0.1); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Mobile Overlay */
        @media (max-width: 768px) {
            #sidebar { position: absolute; z-index: 40; transform: translateX(-100%); width: 100% !important; max-width: 320px; }
            #sidebar.mobile-open { transform: translateX(0); }
        }
    </style>
</head>
<body class="bg-light-bg text-light-text dark:bg-obsidian-bg dark:text-obsidian-text h-screen w-full flex transition-colors duration-200">

    <!-- Mobile Overlay -->
    <div id="overlay" class="fixed inset-0 bg-black bg-opacity-50 z-30 transition-opacity hidden md:hidden"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="w-72 sm:w-80 h-full flex flex-col border-r border-light-border dark:border-obsidian-border bg-light-sidebar dark:bg-obsidian-sidebar shrink-0 relative">
        
        <div class="h-14 flex items-center justify-between px-4 border-b border-light-border dark:border-obsidian-border shrink-0">
            <div class="flex items-center gap-2">
                <button onclick="toggleSidebar()" class="p-1.5 rounded-md hover:bg-gray-200 dark:hover:bg-gray-800 text-light-muted dark:text-obsidian-muted" title="Hide Sidebar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </button>
                <span class="font-semibold text-sm tracking-wide">Workspace</span>
            </div>
            <div class="flex gap-1">
                <button onclick="openFolderModal(null)" class="p-1.5 rounded-md hover:bg-gray-200 dark:hover:bg-gray-800 text-light-text dark:text-obsidian-text" title="New Root Folder">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path><line x1="12" y1="11" x2="12" y2="17"></line><line x1="9" y1="14" x2="15" y2="14"></line></svg>
                </button>
                <button onclick="createNote()" class="p-1.5 rounded-md hover:bg-gray-200 dark:hover:bg-gray-800 text-light-text dark:text-obsidian-text" title="New Note (Uncategorized)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                </button>
            </div>
        </div>

        <div class="p-3 shrink-0">
            <div class="relative flex items-center">
                <svg class="absolute left-2.5 text-light-muted dark:text-obsidian-muted" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" id="search-input" placeholder="Search notes..." class="w-full pl-8 pr-3 py-1.5 bg-white dark:bg-obsidian-bg border border-light-border dark:border-obsidian-border rounded-md text-sm outline-none focus:ring-1 focus:ring-light-accent dark:focus:ring-obsidian-accent transition-all">
            </div>
        </div>

        <div id="labels-container" class="px-3 pb-2 flex gap-2 overflow-x-auto shrink-0 border-b border-light-border dark:border-obsidian-border hide-scrollbar"></div>

        <div id="tree-container" class="flex-1 overflow-y-auto p-2">
            <!-- Uncategorized & Folders injected here -->
        </div>
        
        <div class="p-3 border-t border-light-border dark:border-obsidian-border text-xs text-light-muted dark:text-obsidian-muted flex justify-between items-center bg-light-sidebar dark:bg-obsidian-sidebar shrink-0">
            <span id="note-count">0 notes</span>
            <span class="opacity-70">Rimnote Workspace</span>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 relative h-full bg-white dark:bg-obsidian-bg">
        
        <header class="h-14 flex items-center justify-between px-2 sm:px-4 border-b border-light-border dark:border-obsidian-border shrink-0 w-full overflow-x-auto bg-light-sidebar dark:bg-obsidian-sidebar">
            <div class="flex items-center">
                <button id="btn-toggle-sidebar-main" onclick="toggleSidebar()" class="hidden p-1.5 mr-2 rounded-md hover:bg-gray-200 dark:hover:bg-gray-800 text-light-muted dark:text-obsidian-muted">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </button>
                <div class="text-sm font-medium text-light-muted dark:text-obsidian-muted">Rimnote</div>
            </div>
            
            <div class="flex items-center gap-1 sm:gap-2 shrink-0">
                <label class="cursor-pointer p-1.5 rounded-md hover:bg-gray-200 dark:hover:bg-gray-800 text-light-text dark:text-obsidian-text flex items-center gap-1 text-sm" title="Import JSON Backup">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    <input type="file" accept=".json" class="hidden" onchange="importData(event)">
                </label>
                <button onclick="exportData()" class="p-1.5 rounded-md hover:bg-gray-200 dark:hover:bg-gray-800 text-light-text dark:text-obsidian-text flex items-center gap-1 text-sm" title="Download JSON Backup">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                </button>
                <div class="w-px h-5 bg-light-border dark:bg-obsidian-border mx-1"></div>
                <button onclick="toggleTheme()" class="p-1.5 rounded-md hover:bg-gray-200 dark:hover:bg-gray-800 text-light-text dark:text-obsidian-text transition-colors" title="Toggle Theme">
                    <svg id="icon-sun" class="hidden" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                    <svg id="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </button>
            </div>
        </header>

        <!-- Tab Bar -->
        <div id="tab-bar" class="flex overflow-x-auto border-b border-light-border dark:border-obsidian-border bg-light-bg dark:bg-obsidian-sidebar hide-scrollbar shrink-0">
            <!-- Tabs injected by JS -->
        </div>

        <!-- Formatting Toolbar -->
        <div id="formatting-toolbar" class="flex items-center gap-1 sm:gap-2 px-2 py-1.5 border-b border-light-border dark:border-obsidian-border shrink-0 flex-wrap bg-white dark:bg-obsidian-bg hidden">
            
            <!-- Fonts & Sizes -->
            <select onchange="formatDoc('fontName', this.value)" class="text-xs p-1 rounded border border-light-border dark:border-obsidian-border bg-transparent text-light-text dark:text-obsidian-text outline-none cursor-pointer">
                <option value="Inter">Inter</option>
                <option value="Arial">Arial</option>
                <option value="Times New Roman">Times New Roman</option>
                <option value="Roboto">Roboto</option>
                <option value="Playfair Display">Playfair</option>
            </select>
            
            <select onchange="formatDoc('fontSize', this.value)" class="text-xs p-1 rounded border border-light-border dark:border-obsidian-border bg-transparent text-light-text dark:text-obsidian-text outline-none cursor-pointer w-14">
                <option value="1">10px</option>
                <option value="2">13px</option>
                <option value="3" selected>16px</option>
                <option value="4">18px</option>
                <option value="5">24px</option>
                <option value="6">32px</option>
                <option value="7">48px</option>
            </select>

            <select onchange="changeLineHeight(this.value)" class="text-xs p-1 rounded border border-light-border dark:border-obsidian-border bg-transparent text-light-text dark:text-obsidian-text outline-none cursor-pointer" title="Line Spacing (Padding)">
                <option value="spacing-normal">Spacing: Normal</option>
                <option value="spacing-relaxed">Spacing: Relaxed</option>
                <option value="spacing-loose">Spacing: Loose</option>
                <option value="spacing-very-loose">Spacing: Very Loose</option>
            </select>

            <div class="w-px h-4 bg-light-border dark:bg-obsidian-border mx-1"></div>

            <!-- Headings -->
            <button onclick="formatDoc('formatBlock', 'H1')" class="p-1 rounded hover:bg-gray-100 dark:hover:bg-gray-800 text-xs font-bold" title="Heading 1">H1</button>
            <button onclick="formatDoc('formatBlock', 'H2')" class="p-1 rounded hover:bg-gray-100 dark:hover:bg-gray-800 text-xs font-bold" title="Heading 2">H2</button>
            <button onclick="formatDoc('formatBlock', 'H3')" class="p-1 rounded hover:bg-gray-100 dark:hover:bg-gray-800 text-xs font-bold" title="Heading 3">H3</button>

            <div class="w-px h-4 bg-light-border dark:bg-obsidian-border mx-1"></div>

            <!-- Basic Text -->
            <button onclick="formatDoc('bold')" class="p-1 rounded hover:bg-gray-100 dark:hover:bg-gray-800 font-bold" title="Bold">B</button>
            <button onclick="formatDoc('italic')" class="p-1 rounded hover:bg-gray-100 dark:hover:bg-gray-800 italic" title="Italic">I</button>
            <button onclick="formatDoc('underline')" class="p-1 rounded hover:bg-gray-100 dark:hover:bg-gray-800 underline" title="Underline">U</button>
            <button onclick="formatDoc('strikeThrough')" class="p-1 rounded hover:bg-gray-100 dark:hover:bg-gray-800 line-through font-medium" title="Strikethrough">S</button>
            
            <!-- Colors -->
            <div class="relative flex items-center" title="Text Color">
                <input type="color" id="textColor" onchange="formatDoc('foreColor', this.value)" class="w-5 h-5 p-0 border-0 bg-transparent cursor-pointer">
            </div>
            <div class="relative flex items-center" title="Highlight Color">
                <input type="color" id="hlColor" onchange="formatDoc('hiliteColor', this.value)" value="#ffff00" class="w-5 h-5 p-0 border-0 bg-transparent cursor-pointer">
            </div>

            <div class="w-px h-4 bg-light-border dark:bg-obsidian-border mx-1"></div>

            <!-- Lists -->
            <button onclick="formatDoc('insertUnorderedList')" class="p-1 rounded hover:bg-gray-100 dark:hover:bg-gray-800" title="Bullet List">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
            </button>
            <button onclick="formatDoc('insertOrderedList')" class="p-1 rounded hover:bg-gray-100 dark:hover:bg-gray-800" title="Numbered List">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="10" y1="6" x2="21" y2="6"></line><line x1="10" y1="12" x2="21" y2="12"></line><line x1="10" y1="18" x2="21" y2="18"></line><path d="M4 6h1v4"></path><path d="M4 10h2"></path><path d="M6 18H4c0-1 2-2 2-3s-1-1.5-2-1"></path></svg>
            </button>
            <button onclick="applyChecklistToSelection()" class="p-1 rounded hover:bg-gray-100 dark:hover:bg-gray-800" title="Checklist (Select lines first)">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"></polyline><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>
            </button>

            <!-- Folder Select & Delete -->
            <div class="ml-auto flex items-center gap-2">
                <select id="note-folder-select" onchange="moveNoteFolder(this.value)" class="text-xs p-1 rounded bg-gray-100 dark:bg-obsidian-sidebar text-light-text dark:text-obsidian-text outline-none cursor-pointer max-w-[120px]">
                    <!-- Injected by JS -->
                </select>
                <button onclick="openDeleteModal()" class="p-1 rounded hover:bg-red-100 dark:hover:bg-red-900/30 text-red-500" title="Delete Note">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                </button>
            </div>
        </div>

        <div id="editor-container" class="flex-1 overflow-y-auto w-full px-6 py-6 sm:px-12 sm:py-8 flex flex-col hidden">
            <div class="max-w-4xl w-full mx-auto flex-1 flex flex-col relative">
                
                <div id="note-title" contenteditable="true" class="editor-title text-4xl sm:text-5xl font-bold border-none bg-transparent mb-4 text-light-text dark:text-white" placeholder="Untitled Note"></div>
                
                <div class="flex items-center gap-2 mb-6 border-b border-light-border dark:border-obsidian-border pb-2">
                    <svg class="text-light-muted dark:text-obsidian-muted" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg>
                    <input type="text" id="note-tags" class="text-sm border-none outline-none bg-transparent text-light-muted dark:text-obsidian-muted placeholder-light-muted dark:placeholder-obsidian-muted w-full" placeholder="Add labels (comma separated)...">
                </div>

                <div id="note-content" contenteditable="true" class="editor-content flex-1 border-none bg-transparent text-base sm:text-lg text-gray-800 dark:text-gray-300 placeholder-light-muted dark:placeholder-obsidian-muted spacing-normal transition-all" placeholder="Start typing here... Use the toolbar above for formatting."></div>
            </div>
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="flex-1 flex flex-col items-center justify-center text-light-muted dark:text-obsidian-muted bg-gray-50 dark:bg-[#0b0c10]">
            <svg class="w-16 h-16 mb-4 opacity-30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
            <p class="text-lg font-medium">Select a note or create a new one</p>
            <p class="text-sm mt-2 max-w-sm text-center opacity-70">Rimnote supports nested folders, rich text, and continuous auto-save backups.</p>
        </div>

    </main>

    <!-- Folder Creation Modal -->
    <div id="modal-folder" class="fixed inset-0 bg-black bg-opacity-60 hidden items-center justify-center z-50 transition-opacity opacity-0 backdrop-blur-sm">
        <div class="bg-white dark:bg-obsidian-sidebar p-6 rounded-xl w-80 shadow-2xl transform transition-transform scale-95 border border-light-border dark:border-obsidian-border">
            <h3 id="modal-folder-title" class="text-lg font-semibold mb-4 text-light-text dark:text-white">Create Folder</h3>
            <input type="hidden" id="folder-parent-id">
            <input type="text" id="folder-name-input" class="w-full p-2.5 bg-gray-50 dark:bg-obsidian-bg border border-light-border dark:border-obsidian-border rounded-lg mb-4 text-light-text dark:text-white outline-none focus:border-light-accent dark:focus:border-obsidian-accent" placeholder="Folder Name" autocomplete="off">
            <div class="flex justify-end gap-2 text-sm">
                <button onclick="closeModal('modal-folder')" class="px-4 py-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-800 text-light-text dark:text-white transition-colors">Cancel</button>
                <button onclick="confirmCreateFolder()" class="px-4 py-2 rounded-lg bg-light-accent dark:bg-obsidian-accent hover:opacity-90 text-white transition-opacity font-medium">Create</button>
            </div>
        </div>
    </div>

    <!-- Delete Modal -->
    <div id="modal-delete" class="fixed inset-0 bg-black bg-opacity-60 hidden items-center justify-center z-50 transition-opacity opacity-0 backdrop-blur-sm">
        <div class="bg-white dark:bg-obsidian-sidebar p-6 rounded-xl w-80 shadow-2xl transform transition-transform scale-95 border border-light-border dark:border-obsidian-border">
            <h3 class="text-lg font-semibold mb-2 text-light-text dark:text-white">Delete Note</h3>
            <p class="text-sm text-light-muted dark:text-obsidian-muted mb-4">Are you sure you want to delete this note? This action cannot be undone.</p>
            <div class="flex justify-end gap-2 text-sm">
                <button onclick="closeModal('modal-delete')" class="px-4 py-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-800 text-light-text dark:text-white transition-colors">Cancel</button>
                <button onclick="confirmDeleteNote()" class="px-4 py-2 rounded-lg bg-red-600 hover:bg-red-700 text-white transition-colors font-medium">Delete</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-2"></div>

    <script>
        const STORAGE_KEY = 'rimnote_data';
        const OLD_STORAGE_KEY = 'advanced_notes_v3'; // For backward compatibility migration
        const THEME_KEY = 'rimnote_theme';
        
        let notes = [];
        let folders = []; 
        let openTabs = [];
        let activeTabId = null;
        
        let activeLabel = null;
        let searchQuery = '';
        let saveTimeout = null;
        let isSidebarCollapsed = false;

        const DOM = {
            sidebar: document.getElementById('sidebar'),
            overlay: document.getElementById('overlay'),
            treeContainer: document.getElementById('tree-container'),
            labelsContainer: document.getElementById('labels-container'),
            searchInput: document.getElementById('search-input'),
            editorContainer: document.getElementById('editor-container'),
            emptyState: document.getElementById('empty-state'),
            tabBar: document.getElementById('tab-bar'),
            formattingToolbar: document.getElementById('formatting-toolbar'),
            noteTitle: document.getElementById('note-title'),
            noteContent: document.getElementById('note-content'),
            noteTags: document.getElementById('note-tags'),
            noteFolderSelect: document.getElementById('note-folder-select'),
            noteCount: document.getElementById('note-count'),
            btnToggleMain: document.getElementById('btn-toggle-sidebar-main')
        };

        function init() {
            loadTheme();
            loadData();
            setupEventListeners();
            renderSidebar();
            
            if (openTabs.length > 0) {
                renderTabs();
                if(activeTabId) selectTab(activeTabId);
            } else {
                showEmptyState();
            }
        }

        function loadData() {
            let stored = localStorage.getItem(STORAGE_KEY);
            
            // Migrate from old version if new key is empty
            if (!stored) {
                stored = localStorage.getItem(OLD_STORAGE_KEY);
                if (stored) localStorage.setItem(STORAGE_KEY, stored);
            }

            if (stored) {
                try {
                    const parsed = JSON.parse(stored);
                    notes = parsed.notes || [];
                    notes = notes.map(n => ({...n, folderId: n.folderId === 'default' ? null : n.folderId}));
                    folders = parsed.folders || [];
                    openTabs = parsed.openTabs || [];
                    activeTabId = parsed.activeTabId || null;
                } catch (e) {
                    console.error('Failed to parse notes', e);
                }
            }
        }

        function saveData() {
            const data = { notes, folders, openTabs, activeTabId };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            DOM.noteCount.textContent = `${notes.length} notes`;
        }

        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }

        function autoSave() {
            if (!activeTabId) return;
            const noteIndex = notes.findIndex(n => n.id === activeTabId);
            if (noteIndex === -1) return;

            notes[noteIndex].title = DOM.noteTitle.innerHTML;
            notes[noteIndex].content = DOM.noteContent.innerHTML;
            notes[noteIndex].tags = DOM.noteTags.value;
            notes[noteIndex].updatedAt = Date.now();

            if (saveTimeout) clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                saveData();
                renderTabs(); // Update tab titles
                if (!searchQuery) renderSidebar();
            }, 500);
        }

        function renderSidebar() {
            renderLabels();
            DOM.treeContainer.innerHTML = '';
            
            let filteredNotes = notes.filter(note => {
                const pureTitle = stripHTML(note.title).toLowerCase();
                const pureContent = stripHTML(note.content).toLowerCase();
                const term = searchQuery.toLowerCase();
                const matchSearch = pureTitle.includes(term) || pureContent.includes(term) || (note.tags || '').toLowerCase().includes(term);
                const tagsArray = (note.tags || '').split(',').map(t => t.trim().toLowerCase()).filter(t => t);
                const matchLabel = activeLabel ? tagsArray.includes(activeLabel.toLowerCase()) : true;
                return matchSearch && matchLabel;
            });
            filteredNotes.sort((a, b) => b.updatedAt - a.updatedAt);

            if (filteredNotes.length === 0 && (searchQuery || activeLabel)) {
                DOM.treeContainer.innerHTML = `<div class="p-4 text-sm text-light-muted dark:text-obsidian-muted text-center">No matches found.</div>`;
                return;
            }

            // 1. Render Uncategorized Notes (Top level)
            const uncategorized = filteredNotes.filter(n => !n.folderId);
            if (uncategorized.length > 0 || (!searchQuery && !activeLabel)) {
                const uncatHeader = document.createElement('div');
                uncatHeader.className = 'text-xs font-semibold text-light-muted dark:text-obsidian-muted px-2 py-2 uppercase tracking-wider mt-2 mb-1';
                uncatHeader.textContent = 'Uncategorized';
                DOM.treeContainer.appendChild(uncatHeader);
                
                uncategorized.forEach(note => {
                    DOM.treeContainer.appendChild(createNoteElement(note));
                });
            }

            // 2. Render Folders Tree
            const rootFolders = folders.filter(f => !f.parentId);
            if (rootFolders.length > 0) {
                const folderHeader = document.createElement('div');
                folderHeader.className = 'text-xs font-semibold text-light-muted dark:text-obsidian-muted px-2 py-2 uppercase tracking-wider mt-4 mb-1';
                folderHeader.textContent = 'Folders';
                DOM.treeContainer.appendChild(folderHeader);
                
                rootFolders.forEach(folder => {
                    DOM.treeContainer.appendChild(renderFolderRecursive(folder, filteredNotes, 0));
                });
            }
            
            DOM.noteCount.textContent = `${notes.length} notes`;
            populateFolderDropdown();
        }

        function renderFolderRecursive(folder, filteredNotes, depth) {
            const folderNotes = filteredNotes.filter(n => n.folderId === folder.id);
            const childFolders = folders.filter(f => f.parentId === folder.id);
            
            const folderDiv = document.createElement('div');
            folderDiv.className = 'mb-0.5';
            
            const paddingLeft = depth * 12 + 8; // Indentation
            
            const arrowPath = folder.collapsed ? '<path d="M9 18l6-6-6-6"></path>' : '<path d="M6 9l6 6 6-6"></path>';
            
            // Header
            const headerDiv = document.createElement('div');
            headerDiv.className = `flex items-center py-1.5 rounded-md cursor-pointer hover:bg-gray-200 dark:hover:bg-gray-800 text-light-text dark:text-obsidian-text group transition-colors`;
            headerDiv.style.paddingLeft = `${paddingLeft}px`;
            headerDiv.style.paddingRight = '8px';
            
            headerDiv.innerHTML = `
                <div class="flex-1 flex items-center min-w-0" onclick="toggleFolderState('${folder.id}')">
                    <svg class="mr-1.5 opacity-60 shrink-0" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${arrowPath}</svg>
                    <span class="font-medium text-sm truncate select-none">${escapeHTML(folder.name)}</span>
                </div>
                <div class="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity shrink-0">
                    <button onclick="openFolderModal('${folder.id}'); event.stopPropagation();" class="p-1 rounded hover:bg-gray-300 dark:hover:bg-gray-700" title="Add Subfolder">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    </button>
                    <span class="text-xs opacity-50 bg-gray-200 dark:bg-gray-700 px-1.5 rounded">${folderNotes.length}</span>
                </div>
            `;
            folderDiv.appendChild(headerDiv);
            
            // Content
            const contentDiv = document.createElement('div');
            contentDiv.className = `folder-content flex flex-col ${folder.collapsed ? 'hidden' : ''}`;
            
            // Render child folders first
            childFolders.forEach(child => {
                contentDiv.appendChild(renderFolderRecursive(child, filteredNotes, depth + 1));
            });
            
            // Render notes in this folder
            folderNotes.forEach(note => {
                const noteEl = createNoteElement(note);
                noteEl.style.paddingLeft = `${paddingLeft + 20}px`;
                contentDiv.appendChild(noteEl);
            });
            
            folderDiv.appendChild(contentDiv);
            return folderDiv;
        }

        function createNoteElement(note) {
            const noteDiv = document.createElement('div');
            const isActive = note.id === activeTabId;
            
            noteDiv.className = `py-1.5 pr-2 rounded-md text-sm cursor-pointer truncate transition-colors flex items-center ${isActive ? 'bg-light-accent/10 text-light-accent dark:bg-obsidian-active dark:text-white font-medium' : 'text-light-muted dark:text-obsidian-text hover:bg-gray-100 dark:hover:bg-gray-800/60'}`;
            if(!noteDiv.style.paddingLeft) noteDiv.style.paddingLeft = '8px'; // Default padding if not set by recursive

            const displayTitle = stripHTML(note.title) || 'Untitled Note';
            noteDiv.innerHTML = `
                <svg class="mr-2 shrink-0 opacity-50" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
                <span class="truncate">${displayTitle}</span>
            `;
            noteDiv.onclick = () => openTab(note.id);
            return noteDiv;
        }

        function openTab(id) {
            if (!openTabs.includes(id)) {
                openTabs.push(id);
            }
            selectTab(id);
            
            if (window.innerWidth <= 768) {
                DOM.sidebar.classList.remove('mobile-open');
                DOM.overlay.classList.remove('open');
            }
        }

        function selectTab(id) {
            activeTabId = id;
            const note = notes.find(n => n.id === id);
            if (!note) {
                // Failsafe if note deleted
                closeTab(id, new Event('click'));
                return;
            }

            renderTabs();
            renderSidebar(); // Update active state in sidebar

            DOM.emptyState.classList.add('hidden');
            DOM.editorContainer.classList.remove('hidden');
            DOM.editorContainer.classList.add('flex');
            DOM.formattingToolbar.classList.remove('hidden');
            DOM.formattingToolbar.classList.add('flex');
            
            DOM.noteTitle.innerHTML = note.title;
            DOM.noteContent.innerHTML = note.content;
            DOM.noteTags.value = note.tags || '';
            DOM.noteFolderSelect.value = note.folderId || '';

            saveData();
        }

        function closeTab(id, event) {
            if(event) event.stopPropagation();
            openTabs = openTabs.filter(tabId => tabId !== id);
            
            if (activeTabId === id) {
                activeTabId = openTabs.length > 0 ? openTabs[openTabs.length - 1] : null;
            }
            
            saveData();
            renderTabs();
            
            if (activeTabId) {
                selectTab(activeTabId);
            } else {
                showEmptyState();
                renderSidebar();
            }
        }

        function renderTabs() {
            DOM.tabBar.innerHTML = '';
            openTabs.forEach(id => {
                const note = notes.find(n => n.id === id);
                if (!note) return;
                
                const isActive = id === activeTabId;
                const title = stripHTML(note.title) || 'Untitled Note';
                
                const tab = document.createElement('div');
                tab.className = `tab-item group flex items-center gap-2 px-3 py-2 min-w-[120px] max-w-[200px] cursor-pointer text-sm transition-colors border-r border-light-border dark:border-obsidian-border ${isActive ? 'active text-light-accent dark:text-white font-medium' : 'text-light-muted dark:text-obsidian-muted hover:bg-gray-50 dark:hover:bg-gray-800'}`;
                tab.onclick = () => selectTab(id);
                
                tab.innerHTML = `
                    <span class="truncate flex-1 select-none pointer-events-none">${title}</span>
                    <button onclick="closeTab('${id}', event)" class="p-0.5 rounded hover:bg-gray-200 dark:hover:bg-gray-700 opacity-0 group-hover:opacity-100 transition-opacity ${isActive ? 'opacity-100' : ''}">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                `;
                DOM.tabBar.appendChild(tab);
            });
        }

        function createNote() {
            const newNote = {
                id: generateId(),
                folderId: null, 
                title: '',
                content: '',
                tags: '',
                updatedAt: Date.now(),
                createdAt: Date.now()
            };
            notes.unshift(newNote);
            
            searchQuery = '';
            DOM.searchInput.value = '';
            activeLabel = null;
            
            openTab(newNote.id);
            setTimeout(() => DOM.noteTitle.focus(), 50);
        }

        function formatDoc(command, value = null) {
            document.execCommand(command, false, value);
            autoSave();
            DOM.noteContent.focus();
        }

        function changeLineHeight(className) {
            const content = DOM.noteContent;
            content.classList.remove('spacing-normal', 'spacing-relaxed', 'spacing-loose', 'spacing-very-loose');
            content.classList.add(className);
            autoSave();
        }

        function applyChecklistToSelection() {
            const selection = window.getSelection();
            if (!selection.rangeCount) return;
            
            const range = selection.getRangeAt(0);
            const content = range.extractContents();
            
            const tempDiv = document.createElement('div');
            tempDiv.appendChild(content);
            
            let newHtml = '';
            if (tempDiv.innerHTML.trim() === '') {
                newHtml = '<div><input type="checkbox"> &nbsp;</div>';
            } else {
                const blocks = tempDiv.childNodes;
                blocks.forEach(node => {
                    if (node.nodeType === 3 && node.textContent.trim() !== '') {
                        newHtml += `<div><input type="checkbox"> ${node.textContent}</div>`;
                    } else if (node.nodeType === 1) {
                        if (node.tagName !== 'INPUT') {
                            newHtml += `<div><input type="checkbox"> ${node.innerHTML || node.textContent}</div>`;
                        } else {
                            newHtml += node.outerHTML; 
                        }
                    }
                });
            }
            
            const frag = document.createRange().createContextualFragment(newHtml);
            range.insertNode(frag);
            autoSave();
        }

        function renderLabels() {
            const allTags = new Set();
            notes.forEach(n => {
                if (n.tags) n.tags.split(',').forEach(t => { if(t.trim()) allTags.add(t.trim()); });
            });
            DOM.labelsContainer.innerHTML = '';
            if (allTags.size === 0) { DOM.labelsContainer.classList.add('hidden'); return; }
            
            DOM.labelsContainer.classList.remove('hidden');
            const allChip = document.createElement('button');
            allChip.className = `px-2.5 py-1 text-xs rounded-full whitespace-nowrap transition-colors border ${activeLabel === null ? 'bg-light-accent text-white border-transparent dark:bg-obsidian-accent' : 'bg-transparent border-light-border dark:border-obsidian-border text-light-muted dark:text-obsidian-muted hover:bg-gray-100 dark:hover:bg-gray-800'}`;
            allChip.textContent = 'All';
            allChip.onclick = () => { activeLabel = null; renderSidebar(); };
            DOM.labelsContainer.appendChild(allChip);

            Array.from(allTags).sort().forEach(tag => {
                const chip = document.createElement('button');
                const isActive = activeLabel === tag;
                chip.className = `px-2.5 py-1 text-xs rounded-full whitespace-nowrap transition-colors border ${isActive ? 'bg-light-accent text-white border-transparent dark:bg-obsidian-accent' : 'bg-transparent border-light-border dark:border-obsidian-border text-light-muted dark:text-obsidian-muted hover:bg-gray-100 dark:hover:bg-gray-800'}`;
                chip.textContent = tag;
                chip.onclick = () => { activeLabel = tag; renderSidebar(); };
                DOM.labelsContainer.appendChild(chip);
            });
        }

        function populateFolderDropdown() {
            DOM.noteFolderSelect.innerHTML = '<option value="">(Uncategorized)</option>';
            
            const buildOptions = (parentId, depth) => {
                folders.filter(f => f.parentId === parentId).forEach(f => {
                    const opt = document.createElement('option');
                    opt.value = f.id;
                    opt.innerHTML = '&nbsp;'.repeat(depth * 4) + (depth > 0 ? '↳ ' : '') + escapeHTML(f.name);
                    DOM.noteFolderSelect.appendChild(opt);
                    buildOptions(f.id, depth + 1);
                });
            };
            buildOptions(null, 0);
            
            if (activeTabId) {
                const note = notes.find(n => n.id === activeTabId);
                if (note) DOM.noteFolderSelect.value = note.folderId || '';
            }
        }

        function moveNoteFolder(newFolderId) {
            if (!activeTabId) return;
            const note = notes.find(n => n.id === activeTabId);
            if (note) {
                note.folderId = newFolderId || null;
                note.updatedAt = Date.now();
                saveData();
                renderSidebar();
                showToast('Note moved', 'success');
            }
        }

        function openFolderModal(parentId = null) {
            document.getElementById('folder-parent-id').value = parentId || '';
            const title = parentId ? 'Create Subfolder' : 'Create Root Folder';
            document.getElementById('modal-folder-title').textContent = title;
            
            const modal = document.getElementById('modal-folder');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.querySelector('div').classList.remove('scale-95');
                document.getElementById('folder-name-input').focus();
            }, 10);
        }

        function confirmCreateFolder() {
            const input = document.getElementById('folder-name-input');
            const parentInput = document.getElementById('folder-parent-id');
            const name = input.value.trim();
            const parentId = parentInput.value || null;
            
            if (name) {
                folders.push({ id: generateId(), name: name, parentId: parentId, collapsed: false });
                saveData();
                renderSidebar();
                input.value = '';
                closeModal('modal-folder');
                showToast(`Folder created`, 'success');
            }
        }

        function toggleFolderState(folderId) {
            const folder = folders.find(f => f.id === folderId);
            if (folder) {
                folder.collapsed = !folder.collapsed;
                saveData();
                renderSidebar();
            }
        }

        function openDeleteModal() {
            if (!activeTabId) return;
            const modal = document.getElementById('modal-delete');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => { modal.classList.remove('opacity-0'); modal.querySelector('div').classList.remove('scale-95'); }, 10);
        }

        function confirmDeleteNote() {
            if (!activeTabId) return;
            const idToDelete = activeTabId;
            notes = notes.filter(n => n.id !== idToDelete);
            closeTab(idToDelete);
            closeModal('modal-delete');
            showToast('Note deleted', 'info');
        }

        function closeModal(id) {
            const modal = document.getElementById(id);
            modal.classList.add('opacity-0');
            modal.querySelector('div').classList.add('scale-95');
            setTimeout(() => { modal.classList.add('hidden'); modal.classList.remove('flex'); }, 300);
        }

        function toggleSidebar() {
            if (window.innerWidth <= 768) {
                const isOpen = DOM.sidebar.classList.contains('mobile-open');
                if (isOpen) {
                    DOM.sidebar.classList.remove('mobile-open');
                    DOM.overlay.classList.remove('open');
                } else {
                    DOM.sidebar.classList.add('mobile-open');
                    DOM.overlay.classList.add('open');
                }
            } else {
                isSidebarCollapsed = !isSidebarCollapsed;
                if (isSidebarCollapsed) {
                    DOM.sidebar.classList.add('collapsed');
                    DOM.btnToggleMain.classList.remove('hidden');
                    DOM.btnToggleMain.classList.add('block');
                } else {
                    DOM.sidebar.classList.remove('collapsed');
                    DOM.btnToggleMain.classList.add('hidden');
                    DOM.btnToggleMain.classList.remove('block');
                }
            }
        }

        function showEmptyState() {
            DOM.editorContainer.classList.add('hidden');
            DOM.editorContainer.classList.remove('flex');
            DOM.formattingToolbar.classList.add('hidden');
            DOM.formattingToolbar.classList.remove('flex');
            DOM.emptyState.classList.remove('hidden');
        }

        function toggleTheme() {
            const html = document.documentElement;
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem(THEME_KEY, 'light');
                document.getElementById('icon-sun').classList.add('hidden');
                document.getElementById('icon-moon').classList.remove('hidden');
            } else {
                html.classList.add('dark');
                localStorage.setItem(THEME_KEY, 'dark');
                document.getElementById('icon-sun').classList.remove('hidden');
                document.getElementById('icon-moon').classList.add('hidden');
            }
        }

        function loadTheme() {
            const savedTheme = localStorage.getItem(THEME_KEY);
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
                document.documentElement.classList.add('dark');
                document.getElementById('icon-sun').classList.remove('hidden');
                document.getElementById('icon-moon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('icon-sun').classList.add('hidden');
                document.getElementById('icon-moon').classList.remove('hidden');
            }
        }

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            let bgClass = 'bg-obsidian-border text-white border border-gray-700';
            if (type === 'success') bgClass = 'bg-green-600 text-white';
            if (type === 'error') bgClass = 'bg-red-500 text-white';

            toast.className = `px-4 py-3 rounded-lg shadow-2xl transform transition-all duration-300 translate-y-10 opacity-0 flex items-center gap-2 ${bgClass}`;
            toast.innerHTML = `<span class="text-sm font-medium">${escapeHTML(message)}</span>`;
            
            const container = document.getElementById('toast-container');
            container.appendChild(toast);
            
            requestAnimationFrame(() => toast.classList.remove('translate-y-10', 'opacity-0'));
            setTimeout(() => {
                toast.classList.add('translate-y-10', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function escapeHTML(str) {
            if (!str) return '';
            return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag]));
        }

        function stripHTML(html) {
            if (!html) return '';
            const tmp = document.createElement('DIV');
            tmp.innerHTML = html;
            return tmp.textContent || tmp.innerText || '';
        }

        function exportData() {
            const dataStr = JSON.stringify({ notes, folders }, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `rimnote_backup_${new Date().toISOString().slice(0,10)}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast('Backup exported successfully!', 'success');
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (imported.notes && imported.folders) {
                        notes = imported.notes;
                        folders = imported.folders;
                        saveData();
                        renderSidebar();
                        showToast(`Imported successfully!`, 'success');
                    } else { throw new Error("Invalid structure"); }
                } catch (err) {
                    showToast('Failed to import: Invalid file format', 'error');
                }
                event.target.value = '';
            };
            reader.readAsText(file);
        }

        function setupEventListeners() {
            DOM.noteTitle.addEventListener('input', autoSave);
            DOM.noteContent.addEventListener('input', autoSave);
            DOM.noteTags.addEventListener('input', autoSave);
            DOM.searchInput.addEventListener('input', (e) => { searchQuery = e.target.value; renderSidebar(); });
            document.getElementById('folder-name-input').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') confirmCreateFolder();
            });
            DOM.overlay.addEventListener('click', () => {
                DOM.sidebar.classList.remove('mobile-open');
                DOM.overlay.classList.remove('open');
            });
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
